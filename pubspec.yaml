name: msags
description: "MSAGS — Mobile SIWES Assessment and Grading System. Role-based evaluation platform for Industrial Training (IT)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Navigation
  go_router: ^14.8.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Forms
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2

  # UI Utilities
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
